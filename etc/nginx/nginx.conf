user www-data;

worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 65535;

quic_bpf on;

pid /run/nginx.pid;

error_log /var/log/nginx/error.log warn;

include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 32768;
	multi_accept on;
	use epoll;
}

http {
	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	aio threads;
	server_tokens off;
	types_hash_max_size 4096;
	server_names_hash_bucket_size 128;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# Replace "Server" and "X-Powered-By" Headers
	##

	split_clients "${request_id}" $stack_id {
		3%  "iis_codered";         # IIS/5.0 + ASP.NET 1.1 -> Windows 2000, Code Red & Nimda worm ground zero
		3%  "heartbleed";          # Apache/2.2.22 + PHP/5.3 -> The exact Ubuntu 12.04 stack vulnerable to Heartbleed (2014)
		3%  "weblogic_deser";      # WebLogic 10.3.6.0 + Servlet/2.5 -> Infamous 2015 Java Deserialization apocalypse
		3%  "webmin_backdoor";     # MiniServ/1.890 + Perl 5.10 -> Webmin's legendary 2019 supply-chain backdoor (CVE-2019-15107)
		3%  "nostromo_rce";        # nostromo 1.9.6 + CGI/1.1 -> CVE-2019-16278 trivial directory traversal RCE
		3%  "vbulletin_hack";      # nginx/1.4.6 + vBulletin 4.2.0 -> The stack that lost millions of gaming forum passwords
		3%  "magento_shoplift";    # Varnish/2.1.5 + Magento 1.9 -> "Shoplift" RCE (CVE-2015-1397), e-commerce worst nightmare
		3%  "equifax_struts";      # Apache-Coyote/1.1 + Struts 2.3.15 -> The exact Equifax breach footprint (CVE-2017-5638)
		3%  "joomla_rce";          # Cherokee/1.2.101 + Joomla 1.5 -> Dead server running the most hacked CMS version ever
		3%  "w3_total_cache";      # nginx/0.7.65 + W3 Total Cache -> Pre-1.0 Nginx + Iconic WordPress cache RCE
		3%  "thinkphp_botnet";     # lighttpd/1.4.18 + ThinkPHP -> Automated Chinese botnet's favorite RCE target
		3%  "coldfusion_lfi";      # IIS/6.0 + ColdFusion 8 -> Classic Win2k3 + CF8 LFI to dump admin password hashes
		3%  "jboss_jmx";           # JBoss 4.2.2 + Liferay 6.2 -> Unauthenticated jmx-console RCEs + Java deserialization
		3%  "lotus_domino";        # Lotus-Domino/8.5.2 + LotusScript -> Peak 2000s enterprise red-tape nightmare
		3%  "glassfish_traversal"; # GlassFish 3.1.2.2 + JSP/2.2 -> Famous for trivial directory traversals reading /etc/passwd
		3%  "websphere_relic";     # IBM_HTTP_Server/6.0 + WebSphere -> Massive, slow, historically vulnerable enterprise stack
		3%  "oracle_ghost";        # Oracle-Application-Server/10g -> EOL 2011 Oracle's forgotten ghost
		3%  "plesk_shared";        # Apache/2.2.15 + PleskLin -> Classic heavily-targeted shared hosting environment
		3%  "frontpage_ext";       # IIS/7.5 + FrontPage/5.0 -> FrontPage Server Extensions (_vti_bin) left alive in the modern era
		3%  "rompager_misfortune"; # RomPager/4.07 -> "Misfortune Cookie" (CVE-2014-9222), 12M+ home routers owned
		3%  "boa_iot";             # Boa/0.94.13 + CGI/1.1 -> Abandoned 2005, embedded IoT/camera nightmare (CVE-2021-33558)
		3%  "goahead_cam";         # GoAhead-Webs/2.5.0 -> IP camera botnet favorite, trivial LD_PRELOAD vulnerabilities
		3%  "miniupnpd_bof";       # MiniUPnPd/1.4 -> Universal Plug and Play buffer overflows exposing internal networks
		3%  "dlink_hnap";          # D-Link/1.0 + HNAP/1.0 -> Home network administration protocol privilege escalation heaven
		3%  "sonicwall_vpn";       # SonicWALL + SonicOS 6.5 -> Unauthenticated SSL-VPN exploits (SMA100 series vibes)
		3%  "python_dev";          # SimpleHTTP/0.6 + Python/2.7.1 -> Screams "I exposed my local insecure dev server to port 80"
		3%  "ancient_lamp";        # Apache/1.3.37 + PHP/4.4.9 -> Peak 2006 LAMP stack, EOL for over a decade
		3%  "netscape_y2k";        # Netscape-Enterprise/4.1 + LiveWire -> Y2K era enterprise dinosaur
		3%  "cern_og";             # CERN/3.0.01 + CGI/1.0 -> Literally 1996, the original web server with proxy buffer overflows
		3%  "thttpd_format";       # thttpd/2.25b + CGI/1.1 -> Ancient tiny server, format string vulnerabilities from 2003
		3%  "zeus_bof";            # Zeus/4.2 + PHP/4.4.9 -> 2000s high-performance server, infamous for SSLv2 buffer overflow
		3%  "sun_webobjects";      # Sun-ONE/6.1 + WebObjects/5.2 -> Sun Microsystems + Apple's abandoned 90s Java framework
		3%  "zope_python2";        # Zope 2.13.21 -> Classic Python 2.7 object traversal RCEs
		*   "tomcat_default";      # Tomcat/5.5.23 + Servlet/2.4 -> Default catch-all: Default manager creds & CVE-2007-3385+
	}

	map $stack_id $server_cat {
		"iis_codered"         "Microsoft-IIS/5.0";
		"heartbleed"          "Apache/2.2.22 (Ubuntu) mod_ssl/2.2.22 OpenSSL/1.0.1c";
		"weblogic_deser"      "WebLogic Server 10.3.6.0";
		"webmin_backdoor"     "MiniServ/1.890";
		"nostromo_rce"        "nostromo 1.9.6";
		"vbulletin_hack"      "nginx/1.4.6 (Ubuntu)";
		"magento_shoplift"    "Varnish/2.1.5";
		"equifax_struts"      "Apache-Coyote/1.1";
		"joomla_rce"          "Cherokee/1.2.101";
		"w3_total_cache"      "nginx/0.7.65";
		"thinkphp_botnet"     "lighttpd/1.4.18";
		"coldfusion_lfi"      "Microsoft-IIS/6.0";
		"jboss_jmx"           "JBoss-4.2.2.GA";
		"lotus_domino"        "Lotus-Domino/8.5.2";
		"glassfish_traversal" "GlassFish Server Open Source Edition 3.1.2.2";
		"websphere_relic"     "IBM_HTTP_Server/6.0";
		"oracle_ghost"        "Oracle-Application-Server/10g";
		"plesk_shared"        "Apache/2.2.15 (CentOS)";
		"frontpage_ext"       "Microsoft-IIS/7.5";
		"rompager_misfortune" "Allegro-Software-RomPager/4.07 UPnP/1.0";
		"boa_iot"             "Boa/0.94.13";
		"goahead_cam"         "GoAhead-Webs/2.5.0";
		"miniupnpd_bof"       "MiniUPnPd/1.4";
		"dlink_hnap"          "D-Link/1.0";
		"sonicwall_vpn"       "SonicWALL";
		"python_dev"          "SimpleHTTP/0.6 Python/2.7.1";
		"ancient_lamp"        "Apache/1.3.37";
		"netscape_y2k"        "Netscape-Enterprise/4.1";
		"cern_og"             "CERN/3.0.01";
		"thttpd_format"       "thttpd/2.25b 29dec2003";
		"zeus_bof"            "Zeus/4.2";
		"sun_webobjects"      "Sun-ONE-Web-Server/6.1";
		"zope_python2"        "Zope/(Zope 2.13.21, python 2.7.9, linux2) ZServer/1.1";
		"tomcat_default"      "Tomcat/5.5.23";
	}

	map $stack_id $powered_cat {
		"iis_codered"         "ASP.NET/1.1.4322";
		"heartbleed"          "PHP/5.3.10-1ubuntu3.11";
		"weblogic_deser"      "Servlet/2.5 JSP/2.1";
		"webmin_backdoor"     "Perl/v5.10.1";
		"nostromo_rce"        "CGI/1.1";
		"vbulletin_hack"      "vBulletin 4.2.0";
		"magento_shoplift"    "Magento 1.9.0.1";
		"equifax_struts"      "Struts/2.3.15";
		"joomla_rce"          "Joomla! 1.5";
		"w3_total_cache"      "W3 Total Cache/0.9.2.4";
		"thinkphp_botnet"     "ThinkPHP";
		"coldfusion_lfi"      "ColdFusion 8";
		"jboss_jmx"           "Liferay Portal Enterprise Edition 6.2.10 EE GA1";
		"lotus_domino"        "LotusScript/8.5";
		"glassfish_traversal" "JSP/2.2";
		"websphere_relic"     "WebSphere/6.0";
		"oracle_ghost"        "Oracle-AS/10g";
		"plesk_shared"        "PleskLin";
		"frontpage_ext"       "FrontPage/5.0.2.2623";
		"rompager_misfortune" "RomPager/4.07";
		"boa_iot"             "CGI/1.1";
		"goahead_cam"         "GoAhead/2.5.0";
		"miniupnpd_bof"       "MiniUPnPd/1.4";
		"dlink_hnap"          "HNAP/1.0";
		"sonicwall_vpn"       "SonicOS/6.5.4.4";
		"python_dev"          "Python/2.7.1";
		"ancient_lamp"        "PHP/4.4.9";
		"netscape_y2k"        "LiveWire/4.1";
		"cern_og"             "CGI/1.0";
		"thttpd_format"       "CGI/1.1";
		"zeus_bof"            "PHP/4.4.9";
		"sun_webobjects"      "WebObjects/5.2";
		"zope_python2"        "Zope/2.13.21";
		"tomcat_default"      "Servlet/2.4";
	}

	more_set_headers "Server: $server_cat" "X-Powered-By: $powered_cat";

	##
	# Timeouts
	##

	client_body_timeout 10s;
	client_header_timeout 10s;
	keepalive_timeout 60s;
	send_timeout 20s;
  	reset_timedout_connection on;

	##
	# Buffer & Size limits
	##

	client_body_buffer_size 128k;
	client_header_buffer_size 1k;
	client_max_body_size 20m;
	large_client_header_buffers 4 8k;
	ignore_invalid_headers on;
	output_buffers 2 1m;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1.3 TLSv1.2;
	ssl_session_cache shared:SSL:10m;
	ssl_session_timeout 1d;
	ssl_session_tickets off;
	ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
	ssl_conf_command Options PrioritizeChaCha;
	ssl_ecdh_curve X25519MLKEM768:X25519:prime256v1;

	# TLSv1.2 support
	ssl_prefer_server_ciphers on;
	ssl_ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256";

	##
	# QUIC / HTTP/3
	##

	ssl_early_data off;
	quic_retry on;
	quic_gso on;

	more_set_headers "Alt-Svc: h3=\":443\"; ma=86400";

	##
	# Security Headers
	##

	more_set_headers "X-Frame-Options: SAMEORIGIN";
	more_set_headers "X-Content-Type-Options: nosniff";
	more_set_headers "Referrer-Policy: strict-origin";
	more_set_headers "Reporting-Endpoints: csp=\"https://sec.shrt.day/meow\"";
	more_set_headers "Content-Security-Policy: default-src 'self'; img-src https: data: blob:; media-src https: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://scout.shrt.day https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://scout.shrt.day; base-uri 'self'; form-action 'self'; report-to csp; report-uri https://sec.shrt.day/meow;";

	# we do not do http around here
	more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";

	##
	# Content Headers
	##

	charset utf-8;
	charset_types
		text/plain
		text/css
		text/xml
		application/xml
		application/rss+xml
		application/javascript
		application/json
		image/svg+xml;

	##
	# Cache Settings
	##

	open_file_cache max=100000 inactive=20s;
	open_file_cache_valid 30s;
	open_file_cache_min_uses 2;
	open_file_cache_errors on;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;

	##
	# Gzip Settings
	##

	gzip on;
	gzip_vary on;
	gzip_comp_level 6;
	gzip_min_length 256;
	gzip_proxied any;
	gzip_static on;
	gzip_types
		text/plain text/css text/xml application/xml application/xhtml+xml
		application/rss+xml application/javascript application/json
		image/svg+xml application/x-font-ttf font/ttf font/otf
		application/vnd.ms-fontobject font/woff font/woff2;

	##
	# Brotli Settings
	##

	brotli on;
	brotli_comp_level 4;
	brotli_types text/plain text/css application/javascript application/json image/svg+xml;
	brotli_min_length 256;
	brotli_static on;

	##
	# Proxy Defaults
	##

	proxy_http_version 1.1;
	proxy_set_header Host $host;

	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $remote_addr;
	proxy_set_header X-Forwarded-Proto $scheme;

	proxy_cache_bypass $http_upgrade;

	map $http_upgrade $connection_upgrade {
		default upgrade;
		""      close;
	}

	proxy_set_header Connection $connection_upgrade;
	proxy_set_header Upgrade $http_upgrade;
	proxy_set_header Forwarded "";

	##
	# Custom blocker list
	##

	include wall.conf;

	##
	# Virtual Host Configs
	##

	server {
		listen 443 ssl;
		listen 443 quic;
		server_name example.com;
		http2 on;

		if ($block_request) {
			return 444;
		}

		root /var/example.com;

		location / {
			index index.html index.htm;
		}

		ssl_certificate /var/.ssl/example.com/cert.pem;
		ssl_certificate_key /var/.ssl/example.com/key.pem;
	}

	# default catch-all

	server {
		listen 80 default_server;
		listen [::]:80 default_server;

		server_name _;

		return 444;
	}

	server {
		listen 443 ssl default_server;
		listen [::]:443 ssl default_server;

		server_name _;

		ssl_reject_handshake on;

		return 444;
	}
}
